name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish plugin ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint PHP
        run: |
          for f in $(find . -name '*.php' -not -path './build/*'); do
            php -l "$f"
          done

      - name: Build plugin ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building headless-mode ${VERSION}"
          mkdir -p build/headless-mode
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'deploy.sh' \
            --exclude '*.zip' \
            --exclude 'build' \
            ./ build/headless-mode/
          ( cd build && zip -rq "../headless-mode-${VERSION}.zip" headless-mode )
          unzip -l "headless-mode-${VERSION}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            headless-mode-*.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes "parteieuropa.eu - Headless Mode ${GITHUB_REF_NAME}. See readme.txt for the changelog."
